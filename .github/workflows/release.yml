name: Nightly Release

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: nightly-release-pipeline
      cancel-in-progress: true
    # Skip release commits (prevent loops) and non-code commits
    if: "!contains(github.event.head_commit.message, 'chore: release')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Check for code changes
        id: changes
        run: |
          CODE_CHANGES=$(git diff --name-only HEAD~1 HEAD -- \
            'platform/**' 'surfaces/**' 'integrations/**' 'libs/**' 'dist/**' 'plugins/**' 'runtimes/**' 'scripts/**' \
            'package.json' 'bunfig.toml' 'tsconfig*.json' \
            '.github/workflows/**' \
            | grep -v '\.md$' \
            | grep -v '^.github/workflows/forge-release.yml$' \
            | grep -v '^runtimes/forge/' \
            | grep -v '^surfaces/cli/templates/forge/manifest.json$' \
            | grep -v '^dist/signetai/templates/forge/manifest.json$' \
            | grep -v '\.jpg$' \
            | grep -v '\.jpeg$' \
            | grep -v '\.png$' \
            | grep -v '\.svg$' \
            | head -1 || true)
          if [ -z "$CODE_CHANGES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No code changes detected, skipping release"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Code changes detected, proceeding with release"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.skip != 'true'

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: bun install

      - name: Build
        if: steps.changes.outputs.skip != 'true'
        run: bun run build

      - name: CLI runtime smoke check
        if: steps.changes.outputs.skip != 'true'
        run: node dist/signetai/bin/signet.js --help > /dev/null

      - name: Configure Git
        if: steps.changes.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote main
        if: steps.changes.outputs.skip != 'true'
        run: |
          # Rebase onto the latest remote main before bumping so the version
          # commit and tag land on top of the final tree — not a stale snapshot
          # that would get rewritten later, leaving asset build and publish jobs
          # checking out the wrong commit.
          git reset --hard HEAD
          git clean -fd
          git pull --rebase origin main

      - name: Bump version
        id: bump_version
        if: steps.changes.outputs.skip != 'true'
        run: |
          set -euo pipefail

          LOCAL_VERSION=$(jq -r '.version' dist/signetai/package.json)
          REMOTE_VERSION_JSON=$(git show 'origin/main:dist/signetai/package.json' 2>/dev/null || true)

          if [ -n "$REMOTE_VERSION_JSON" ]; then
            REMOTE_VERSION=$(printf '%s' "$REMOTE_VERSION_JSON" | jq -r '.version')
          else
            REMOTE_VERSION="$LOCAL_VERSION"
          fi

          BASE_VERSION=$(printf '%s\n%s\n' "$LOCAL_VERSION" "$REMOTE_VERSION" | sort -V | tail -n1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          bun scripts/changelog.ts --bump-only

          BUMP=$(cat .bump-level 2>/dev/null || echo "patch")
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            *)     NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "BUMP_LEVEL=$BUMP" >> $GITHUB_ENV
          echo "bump_level=$BUMP" >> $GITHUB_OUTPUT
          rm -f .bump-level

          # Keep all release-owned version surfaces aligned. This covers
          # package.json files, publishable workspace dependency rewrites,
          # Cargo.toml manifests, Cargo.lock files, and generated manifest
          # copies so the release commit passes the same guard as PRs.
          bun scripts/version-sync.ts --to "$NEW_VERSION"

          bun scripts/changelog.ts --version "$NEW_VERSION"

          # Keep lockfile aligned with workspace version bumps so frozen installs
          # (Docker smoke and consumer builds) stay deterministic.
          bun install

          git add -A
          git commit -m "chore: release $NEW_VERSION"
          git tag "v$NEW_VERSION"

      - name: Push version bump
        if: steps.changes.outputs.skip != 'true'
        run: |
          git push origin HEAD:main
          git push origin "v$NEW_VERSION"

      - name: Create GitHub Nightly Release (draft prerelease)
        id: create_release
        if: steps.changes.outputs.skip != 'true'
        run: |
          NOTES=$(bun scripts/extract-changelog-section.ts "$NEW_VERSION")
          if [ -z "$NOTES" ] || [ "$NOTES" = "No changelog section found for v$NEW_VERSION" ]; then
            # This runs after the version bump commit and tag are pushed. If it
            # fails, recover by creating the draft release manually with
            # `gh release create "v$NEW_VERSION" --draft --notes-file <notes>`.
            echo "::error::Missing CHANGELOG.md section for v$NEW_VERSION"
            exit 1
          fi
          # Create as a draft prerelease — daemon assets are uploaded by build-daemon before
          # the publish job verifies asset completeness, undrafts the release,
          # and publishes npm packages to the nightly channel.
          gh release create "v$NEW_VERSION" --draft --prerelease --title "v$NEW_VERSION" --notes "$NOTES"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      version: ${{ steps.create_release.outputs.version }}
      skip: ${{ steps.changes.outputs.skip }}
      bump_level: ${{ steps.bump_version.outputs.bump_level }}


  build-daemon:
    needs: release
    if: needs.release.outputs.skip != 'true' && needs.release.outputs.version != ''
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: signet-daemon-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: signet-daemon-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: signet-daemon-darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: signet-daemon-win32-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset: signet-daemon-win32-arm64.exe
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
      RELEASE_TARGET: ${{ matrix.target }}
      RELEASE_ASSET: ${{ matrix.asset }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install MSVC ARM64 toolchain
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" `
            modify --installPath "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise" `
            --add Microsoft.VisualStudio.Component.VC.Tools.ARM64 --quiet --norestart | Out-Null
          if ($LASTEXITCODE -notin @(0, 3010)) { exit $LASTEXITCODE }

      - name: Build daemon
        shell: bash
        run: cargo build --release --target "$RELEASE_TARGET" -p signet-daemon
        working-directory: platform/daemon-rs
      - name: Upload to release
        shell: bash
        run: |
          EXT=""
          [ "$RUNNER_OS" = "Windows" ] && EXT=".exe"
          BINARY="platform/daemon-rs/target/${RELEASE_TARGET}/release/signet-daemon${EXT}"
          # Copy binary with the platform-specific asset name into a temp
          # directory so gh uploads it under the correct name (not just as a
          # label) and we don't leave artifacts in the repo root.
          STAGING="${RUNNER_TEMP}/upload"
          mkdir -p "${STAGING}"
          cp "${BINARY}" "${STAGING}/${RELEASE_ASSET}"
          openssl dgst -sha256 -hex "${STAGING}/${RELEASE_ASSET}" | awk '{print $NF}' > "${STAGING}/${RELEASE_ASSET}.sha256"
          gh release upload "v${RELEASE_VERSION}" "${STAGING}/${RELEASE_ASSET}" --clobber
          gh release upload "v${RELEASE_VERSION}" "${STAGING}/${RELEASE_ASSET}.sha256" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [release, build-daemon]
    runs-on: ubuntu-latest
    # The npm package postinstall path downloads native daemon assets from the
    # GitHub release. Do not undraft or publish npm unless every daemon matrix
    # leg completed and uploaded its binary/checksum pair.
    if: always() && needs.release.result == 'success' && needs.build-daemon.result == 'success' && needs.release.outputs.skip != 'true' && needs.release.outputs.version != ''
    permissions:
      contents: write
    env:
      NEW_VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Resolve workspace protocols
        run: bun scripts/version-sync.ts --to "$NEW_VERSION"

      - name: Validate publish manifests
        run: bun scripts/check-publish-manifests.ts

      - name: Verify daemon release assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(gh release view "v${NEW_VERSION}" --json assets --jq '.assets[].name')
          expected=(
            signet-daemon-linux-x64
            signet-daemon-linux-x64.sha256
            signet-daemon-darwin-arm64
            signet-daemon-darwin-arm64.sha256
            signet-daemon-darwin-x64
            signet-daemon-darwin-x64.sha256
            signet-daemon-win32-x64.exe
            signet-daemon-win32-x64.exe.sha256
            signet-daemon-win32-arm64.exe
            signet-daemon-win32-arm64.exe.sha256
          )
          for asset in "${expected[@]}"; do
            if ! printf '%s\n' "${ASSETS[@]}" | grep -Fxq "$asset"; then
              echo "::error::Missing release asset: $asset"
              exit 1
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        # Undraft only after publish manifests pass, so a broken npm package
        # cannot slip through behind a green release job.
        # Assets must still be public before npm publish can expose any
        # postinstall downloader paths to users.
        run: gh release edit "v${NEW_VERSION}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm nightly channel
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$NPM_CONFIG_USERCONFIG"
          CURRENT=$(npm view "signetai@${NEW_VERSION}" version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$NEW_VERSION" ]; then
            echo "signetai@$NEW_VERSION already published, refreshing next tag"
            npm dist-tag add "signetai@${NEW_VERSION}" next
            npm dist-tag add "@signetai/signet-memory-openclaw@${NEW_VERSION}" next || true
          else
            cd dist/signetai && npm publish --tag next --access public
            cd ../../integrations/openclaw/memory-adapter && npm publish --tag next --access public || true
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
