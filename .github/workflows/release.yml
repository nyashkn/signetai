name: Nightly Release

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: nightly-release-pipeline
      cancel-in-progress: true
    # Skip release commits (prevent loops) and non-code commits
    if: "!contains(github.event.head_commit.message, 'chore: release')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Check for code changes
        id: changes
        run: |
          CODE_CHANGES=$(git diff --name-only HEAD~1 HEAD -- \
            'platform/**' 'surfaces/**' 'integrations/**' 'libs/**' 'dist/**' 'plugins/**' 'runtimes/**' 'scripts/**' \
            'package.json' 'bunfig.toml' 'tsconfig*.json' \
            '.github/workflows/**' \
            | grep -v '\.md$' \
            | grep -v '\.jpg$' \
            | grep -v '\.jpeg$' \
            | grep -v '\.png$' \
            | grep -v '\.svg$' \
            | head -1 || true)
          if [ -z "$CODE_CHANGES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No code changes detected, skipping release"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Code changes detected, proceeding with release"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.skip != 'true'

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: bun install

      - name: Build
        if: steps.changes.outputs.skip != 'true'
        run: bun run build

      - name: CLI runtime smoke check
        if: steps.changes.outputs.skip != 'true'
        run: bun surfaces/cli/src/cli.ts --help > /dev/null

      - name: Configure Git
        if: steps.changes.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote main
        if: steps.changes.outputs.skip != 'true'
        run: |
          # Rebase onto the latest remote main before bumping so the version
          # commit and tag land on top of the final tree — not a stale snapshot
          # that would get rewritten later, leaving asset build and publish jobs
          # checking out the wrong commit.
          git reset --hard HEAD
          git clean -fd
          git pull --rebase origin main

      - name: Bump version
        id: bump_version
        if: steps.changes.outputs.skip != 'true'
        run: |
          set -euo pipefail

          LOCAL_VERSION=$(jq -r '.version' package.json)
          REMOTE_VERSION_JSON=$(git show 'origin/main:package.json' 2>/dev/null || true)

          if [ -n "$REMOTE_VERSION_JSON" ]; then
            REMOTE_VERSION=$(printf '%s' "$REMOTE_VERSION_JSON" | jq -r '.version')
          else
            REMOTE_VERSION="$LOCAL_VERSION"
          fi

          BASE_VERSION=$(printf '%s\n%s\n' "$LOCAL_VERSION" "$REMOTE_VERSION" | sort -V | tail -n1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          bun scripts/changelog.ts --bump-only

          BUMP=$(cat .bump-level 2>/dev/null || echo "patch")
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            *)     NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "BUMP_LEVEL=$BUMP" >> $GITHUB_ENV
          echo "bump_level=$BUMP" >> $GITHUB_OUTPUT
          rm -f .bump-level

          # Keep all release-owned version surfaces aligned. This covers
          # package.json files, publishable workspace dependency rewrites,
          # Cargo.toml manifests, Cargo.lock files, and generated manifest
          # copies so the release commit passes the same guard as PRs.
          bun scripts/version-sync.ts --to "$NEW_VERSION"

          bun scripts/changelog.ts --version "$NEW_VERSION"

          # Keep lockfile aligned with workspace version bumps so frozen installs
          # (Docker smoke and consumer builds) stay deterministic.
          bun install

          git add -A
          git commit -m "chore: release $NEW_VERSION"
          git tag "v$NEW_VERSION"

      - name: Push version bump
        if: steps.changes.outputs.skip != 'true'
        run: |
          git push origin HEAD:main
          git push origin "v$NEW_VERSION"

      - name: Create GitHub Nightly Release (draft prerelease)
        id: create_release
        if: steps.changes.outputs.skip != 'true'
        run: |
          NOTES=$(bun scripts/extract-changelog-section.ts "$NEW_VERSION")
          if [ -z "$NOTES" ] || [ "$NOTES" = "No changelog section found for v$NEW_VERSION" ]; then
            # This runs after the version bump commit and tag are pushed. If it
            # fails, recover by creating the draft release manually with
            # `gh release create "v$NEW_VERSION" --draft --notes-file <notes>`.
            echo "::error::Missing CHANGELOG.md section for v$NEW_VERSION"
            exit 1
          fi
          # Create as a draft prerelease. Native Signet binaries are uploaded
          # before the publish job generates the manifest and undrafts the
          # GitHub release.
          gh release create "v$NEW_VERSION" --draft --prerelease --title "v$NEW_VERSION" --notes "$NOTES"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      version: ${{ steps.create_release.outputs.version }}
      skip: ${{ steps.changes.outputs.skip }}
      bump_level: ${{ steps.bump_version.outputs.bump_level }}


  build-native:
    needs: release
    if: needs.release.outputs.skip != 'true' && needs.release.outputs.version != ''
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            asset: signet-linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            asset: signet-linux-arm64
          - os: macos-15-intel
            platform: darwin-x64
            asset: signet-darwin-x64
          - os: macos-14
            platform: darwin-arm64
            asset: signet-darwin-arm64
          - os: windows-latest
            platform: win32-x64
            asset: signet-win32-x64.exe
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
      SIGNET_NATIVE_PLATFORM: ${{ matrix.platform }}
      RELEASE_ASSET: ${{ matrix.asset }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build workspace dependencies
        run: bun run build

      - name: Build dashboard assets
        run: bun run build:dashboard

      - name: Build native Signet binary
        run: bun run build:native-bun

      - name: Smoke native binary
        shell: bash
        run: ./dist/native/"$RELEASE_ASSET" --help > /dev/null

      - name: Verify native binary artifact
        shell: bash
        run: test -s ./dist/native/"$RELEASE_ASSET"

      - name: Upload to release
        shell: bash
        run: |
          STAGING="${RUNNER_TEMP}/upload"
          mkdir -p "${STAGING}"
          cp "dist/native/${RELEASE_ASSET}" "${STAGING}/${RELEASE_ASSET}"
          openssl dgst -sha256 -hex "${STAGING}/${RELEASE_ASSET}" | awk '{print $NF}' > "${STAGING}/${RELEASE_ASSET}.sha256"
          gh release upload "v${RELEASE_VERSION}" "${STAGING}/${RELEASE_ASSET}" --clobber
          gh release upload "v${RELEASE_VERSION}" "${STAGING}/${RELEASE_ASSET}.sha256" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [release, build-native]
    runs-on: ubuntu-latest
    # Do not undraft the GitHub release unless every native binary matrix leg
    # completed and uploaded its binary/checksum pair.
    if: always() && needs.release.result == 'success' && needs.build-native.result == 'success' && needs.release.outputs.skip != 'true' && needs.release.outputs.version != ''
    permissions:
      contents: write
    env:
      NEW_VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Download native release assets
        run: |
          mkdir -p dist/native
          gh release download "v${NEW_VERSION}" --pattern "signet-*" --dir dist/native --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and upload native manifest
        run: |
          set -euo pipefail
          # Build the connector plugin-asset tarball before generating
          # the manifest so it can pick up the SHA-256 and size. The
          # tarball mirrors `integrations/*/connector/<asset-dir>/` into
          # `runtime/connectors/<harness>/<asset-dir>/` so the binary's
          # `$SIGNET_DIR/runtime/connectors/...` lookup resolves at
          # install time.
          SIGNET_VERSION="$NEW_VERSION" bun scripts/build-connector-assets.ts
          gh release upload "v${NEW_VERSION}" dist/native/signet-connectors-"${NEW_VERSION}".tar.gz --clobber
          SIGNET_VERSION="$NEW_VERSION" bun scripts/generate-native-manifest.ts
          gh release upload "v${NEW_VERSION}" dist/native/native-manifest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all release assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(gh release view "v${NEW_VERSION}" --json assets --jq '.assets[].name')
          expected=(
            signet-linux-x64
            signet-linux-x64.sha256
            signet-linux-arm64
            signet-linux-arm64.sha256
            signet-darwin-arm64
            signet-darwin-arm64.sha256
            signet-darwin-x64
            signet-darwin-x64.sha256
            signet-win32-x64.exe
            signet-win32-x64.exe.sha256
            signet-connectors-${NEW_VERSION}.tar.gz
            native-manifest.json
          )
          for asset in "${expected[@]}"; do
            if ! printf '%s\n' "${ASSETS[@]}" | grep -Fxq "$asset"; then
              echo "::error::Missing release asset: $asset"
              exit 1
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack native npm release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/native-packages
          stage_native_package() {
            local platform="$1"
            local asset="$2"
            local binary="$3"
            local package_dir="dist/signetai-${platform}"
            mkdir -p "${package_dir}/bin"
            cp "dist/native/${asset}" "${package_dir}/bin/${binary}"
            chmod 755 "${package_dir}/bin/${binary}"
            npm pack "./${package_dir}" --pack-destination dist/native-packages
          }

          stage_native_package "linux-x64" "signet-linux-x64" "signet"
          stage_native_package "linux-arm64" "signet-linux-arm64" "signet"
          stage_native_package "darwin-x64" "signet-darwin-x64" "signet"
          stage_native_package "darwin-arm64" "signet-darwin-arm64" "signet"
          stage_native_package "win32-x64" "signet-win32-x64.exe" "signet.exe"

          gh release upload "v${NEW_VERSION}" dist/native-packages/*.tgz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Point npm wrapper at native release assets
        shell: bash
        run: |
          set -euo pipefail
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${NEW_VERSION}"
          npm pkg set --prefix dist/signetai \
            "optionalDependencies.signetai-linux-x64=${release_url}/signetai-linux-x64-${NEW_VERSION}.tgz" \
            "optionalDependencies.signetai-linux-arm64=${release_url}/signetai-linux-arm64-${NEW_VERSION}.tgz" \
            "optionalDependencies.signetai-darwin-x64=${release_url}/signetai-darwin-x64-${NEW_VERSION}.tgz" \
            "optionalDependencies.signetai-darwin-arm64=${release_url}/signetai-darwin-arm64-${NEW_VERSION}.tgz" \
            "optionalDependencies.signetai-win32-x64=${release_url}/signetai-win32-x64-${NEW_VERSION}.tgz"
          # The install-native.js postinstall reads native-manifest.json from the
          # wrapper package root to download connector assets. The generate step
          # writes it to dist/native/; copy it into the wrapper before publish.
          cp dist/native/native-manifest.json dist/signetai/native-manifest.json

      - name: Validate publish manifests
        run: bun scripts/check-publish-manifests.ts
        env:
          SIGNET_EXPECT_NATIVE_OPTIONAL_DEPS: "1"

      - name: Stage scoped npm packages
        run: bun scripts/stage-npm-publish.ts "${RUNNER_TEMP}/signet-npm-publish"

      - name: Publish npm packages
        run: |
          test -n "$NODE_AUTH_TOKEN"
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          publish_npm_package() {
            local package_dir="$1"
            local optional="${2:-false}"
            local package_name
            package_name=$(node -e 'console.log(JSON.parse(require("fs").readFileSync(process.argv[1], "utf8")).name)' "${package_dir}/package.json")
            local current
            current=$(npm view "${package_name}@${NEW_VERSION}" version 2>/dev/null || echo "0.0.0")
            if [ "$current" = "$NEW_VERSION" ]; then
              echo "${package_name}@${NEW_VERSION} already published, refreshing next tag"
              npm dist-tag add "${package_name}@${NEW_VERSION}" next
              return
            fi
            if [ "$optional" = "true" ]; then
              (cd "$package_dir" && npm publish --tag next --access public) || true
              return
            fi
            (cd "$package_dir" && npm publish --tag next --access public)
          }

          STAGED_NPM_ROOT="${RUNNER_TEMP}/signet-npm-publish"
          publish_npm_package "${STAGED_NPM_ROOT}/core"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-base"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-claude-code"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-codex"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-gemini"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-hermes-agent"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-oh-my-pi"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-openclaw"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-opencode"
          publish_npm_package "${STAGED_NPM_ROOT}/connector-pi"
          publish_npm_package "${STAGED_NPM_ROOT}/codex-plugin"
          publish_npm_package dist/signetai
          publish_npm_package integrations/openclaw/memory-adapter true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc

      - name: Publish release
        # Undraft after release assets, manifest checks, and required npm
        # packages are all published.
        run: gh release edit "v${NEW_VERSION}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
