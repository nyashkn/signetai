name: Rust Daemon Parity

on:
  pull_request:
    paths:
      - "platform/daemon/src/**"
      - "platform/daemon-rs/Cargo.lock"
      - "platform/daemon-rs/Cargo.toml"
      - "platform/daemon-rs/crates/**"
      - "platform/daemon-rs/contracts/parity-rules.json"
      - "platform/daemon-rs/contracts/route-parity.json"
      - "scripts/check-rust-daemon-parity.ts"
      - "scripts/check-rust-daemon-parity.test.ts"
      - ".github/workflows/rust-daemon-parity.yml"
  push:
    branches: [main]
    paths:
      - "platform/daemon/src/**"
      - "platform/daemon-rs/Cargo.lock"
      - "platform/daemon-rs/Cargo.toml"
      - "platform/daemon-rs/crates/**"
      - "platform/daemon-rs/contracts/parity-rules.json"
      - "platform/daemon-rs/contracts/route-parity.json"
      - "scripts/check-rust-daemon-parity.ts"
      - "scripts/check-rust-daemon-parity.test.ts"
      - ".github/workflows/rust-daemon-parity.yml"

permissions:
  contents: read

jobs:
  route-parity:
    name: Check route parity manifest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Verify daemon route parity manifest
        run: |
          bun test scripts/check-rust-daemon-parity.test.ts
          bun scripts/check-rust-daemon-parity.ts
