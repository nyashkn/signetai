name: Bundle

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - "platform/**"
      - "surfaces/**"
      - "integrations/**"
      - "libs/**"
      - "plugins/**"
      - "skills/**"
      - "scripts/**"
      - "deploy/bundle/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/bundle.yml"
  push:
    branches: [main]
    paths:
      - "platform/**"
      - "surfaces/**"
      - "integrations/**"
      - "libs/**"
      - "plugins/**"
      - "skills/**"
      - "scripts/**"
      - "deploy/bundle/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/bundle.yml"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild all components"
        default: false
        type: boolean

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      daemon: ${{ steps.filter.outputs.daemon }}
      daemon_rs: ${{ steps.filter.outputs.daemon_rs }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      connectors: ${{ steps.filter.outputs.connectors }}
      opencode_plugin: ${{ steps.filter.outputs.opencode_plugin }}
      oh_my_pi: ${{ steps.filter.outputs.oh_my_pi }}
      pi_extension: ${{ steps.filter.outputs.pi_extension }}
      native: ${{ steps.filter.outputs.native }}
      skills: ${{ steps.filter.outputs.skills }}
      templates: ${{ steps.filter.outputs.templates }}
      workflows: ${{ steps.filter.outputs.workflows }}
      desktop: ${{ steps.filter.outputs.desktop }}
      should_build: ${{ steps.should_build.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - "surfaces/cli/**"
              - "platform/core/**"
            daemon:
              - "platform/daemon/**"
              - "platform/core/**"
            daemon_rs:
              - "platform/daemon-rs/**"
            dashboard:
              - "surfaces/dashboard/**"
            connectors:
              - "libs/connector-base/**"
              - "integrations/*/connector/**"
              - "platform/core/**"
            opencode_plugin:
              - "integrations/opencode/plugin/**"
              - "platform/core/**"
            oh_my_pi:
              - "integrations/oh-my-pi/extension/**"
              - "platform/core/**"
            pi_extension:
              - "integrations/pi/extension/**"
              - "platform/core/**"
            native:
              - "platform/native/**"
            skills:
              - "skills/**"
            templates:
              - "surfaces/cli/templates/**"
              - "dist/signetai/templates/**"
            workflows:
              - ".github/workflows/bundle.yml"
            desktop:
              - "surfaces/desktop/**"
              - "surfaces/tray/**"
              - "surfaces/dashboard/**"
              - "platform/daemon/**"
              - "platform/core/**"

      - name: Check if anything changed
        id: should_build
        run: |
          FORCE="${{ github.event.inputs.force_rebuild }}"
          if [ "$FORCE" = "true" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED="${{ steps.filter.outputs.cli }}${{ steps.filter.outputs.daemon }}${{ steps.filter.outputs.daemon_rs }}${{ steps.filter.outputs.dashboard }}${{ steps.filter.outputs.connectors }}${{ steps.filter.outputs.opencode_plugin }}${{ steps.filter.outputs.oh_my_pi }}${{ steps.filter.outputs.pi_extension }}${{ steps.filter.outputs.native }}${{ steps.filter.outputs.skills }}${{ steps.filter.outputs.templates }}${{ steps.filter.outputs.workflows }}${{ steps.filter.outputs.desktop }}"
          if echo "$CHANGED" | grep -q "true"; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: darwin-arm64
            rust_target: aarch64-apple-darwin
            electron_arch: arm64
          # macos-13 was retired by GitHub on 2025-12-04; keep the x64
          # package on the current Intel runner label.
          - runner: macos-15-intel
            platform: darwin-x64
            rust_target: x86_64-apple-darwin
            electron_arch: x64
          - runner: ubuntu-latest
            platform: linux-x64
            rust_target: x86_64-unknown-linux-gnu
          # GitHub-hosted standard Linux arm64 runner label.
          # https://docs.github.com/actions/reference/runners/github-hosted-runners
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    env:
      PLATFORM: ${{ matrix.platform }}
      RUST_TARGET: ${{ matrix.rust_target }}
      ARTIFACT_DIR: /tmp/signet-bundle-artifacts
      BUNDLE_NODE_VERSION: 20.19.5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Create artifact directory
        run: mkdir -p "$ARTIFACT_DIR"

      - name: Validate shell scripts
        run: |
          for f in deploy/bundle/install.sh deploy/bundle/update.sh deploy/bundle/uninstall.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done

      - name: Install JS dependencies
        run: |
          for attempt in 1 2 3; do
            echo "bun install attempt ${attempt}/3"
            if bun install; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Build core (shared dependency)
        run: bun run build:core

      # ── Node.js runtime (official distribution) ──

      - name: Stage Node.js runtime
        run: |
          NODE_VER="$BUNDLE_NODE_VERSION"
          case "$PLATFORM" in
            darwin-arm64) NODE_ARCH="darwin-arm64" ;;
            darwin-x64)   NODE_ARCH="darwin-x64" ;;
            linux-x64)    NODE_ARCH="linux-x64" ;;
            linux-arm64)  NODE_ARCH="linux-arm64" ;;
          esac
          NODE_TAR="node-v${NODE_VER}-${NODE_ARCH}.tar.gz"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VER}/${NODE_TAR}" -o "/tmp/${NODE_TAR}"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VER}/SHASUMS256.txt" -o /tmp/SHASUMS256.txt
          EXPECTED_SHA="$(awk -v file="$NODE_TAR" '$2 == file { print $1 }' /tmp/SHASUMS256.txt)"
          if [ -z "$EXPECTED_SHA" ]; then
            echo "::error::Node upstream checksum not found for ${NODE_TAR}"
            exit 1
          fi
          SHA_CMD="sha256sum"
          if ! command -v sha256sum >/dev/null 2>&1; then
            SHA_CMD="shasum -a 256"
          fi
          ACTUAL_SHA="$($SHA_CMD "/tmp/${NODE_TAR}" | awk '{print $1}')"
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Node checksum mismatch for ${NODE_TAR}"
            echo "expected: $EXPECTED_SHA"
            echo "actual:   $ACTUAL_SHA"
            exit 1
          fi
          STAGE="$ARTIFACT_DIR/signet-node-$PLATFORM"
          mkdir -p "$STAGE"
          tar xzf "/tmp/${NODE_TAR}" -C "$STAGE" --strip-components=1
          # Remove dev headers and docs; keep bin/ and lib/ for runtime
          rm -rf "$STAGE/include" "$STAGE/share" "$STAGE/README.md" "$STAGE/LICENSE" "$STAGE/CHANGELOG.md"
          tar czf "$ARTIFACT_DIR/signet-node-$PLATFORM.tar.gz" -C "$STAGE" .
          echo "NODE_VERSION=v${NODE_VER}" >> "$GITHUB_ENV"

      # ── CLI bundle (target node) ──

      - name: Build CLI bundle
        if: matrix.platform == 'linux-x64'
        run: |
          cd surfaces/cli
          bun run build:workspace-deps
          bun run build:cli
          jq '{type:"module", version:.version}' package.json > ./dist/package.json
          tar czf "$ARTIFACT_DIR/signet-cli.tar.gz" -C dist cli.js package.json

      # ── Dashboard ──

      - name: Build dashboard
        if: matrix.platform == 'linux-x64'
        run: |
          cd surfaces/dashboard
          bun install
          bun run build
          tar czf "$ARTIFACT_DIR/signet-dashboard.tar.gz" -C build .

      # ── Daemon JS bundle ──

      - name: Build daemon JS bundle
        env:
          FORCE_NODE_BUILD: "1"
        run: |
          cd platform/daemon
          bun run build
          mkdir -p dist/node_modules
          echo '{"type":"module"}' > dist/package.json
          # Pin versions from package.json for reproducible bundles
          ONNX_VER="$(jq -r '.dependencies["onnxruntime-node"] // "1.21.0"' package.json)"
          BSQ3_VER="$(jq -r '.dependencies["better-sqlite3"] // "11.0.0"' package.json)"
          OP_VER="$(jq -r '.dependencies["@1password/sdk"] // "latest"' package.json)"
          HF_VER="$(jq -r '.dependencies["@huggingface/transformers"] // "latest"' package.json)"
          SODIUM_VER="$(jq -r '.dependencies["libsodium-wrappers"] // "0.8.2"' package.json)"
          SQLITE_VEC_VER="0.1.9"
          SQLITE_VEC_NATIVE=""
          case "$PLATFORM" in
            darwin-arm64) SQLITE_VEC_NATIVE="sqlite-vec-darwin-arm64@$SQLITE_VEC_VER" ;;
            darwin-x64)   SQLITE_VEC_NATIVE="sqlite-vec-darwin-x64@$SQLITE_VEC_VER" ;;
            linux-x64)    SQLITE_VEC_NATIVE="sqlite-vec-linux-x64@$SQLITE_VEC_VER" ;;
            linux-arm64)  SQLITE_VEC_NATIVE="sqlite-vec-linux-arm64@$SQLITE_VEC_VER" ;;
          esac
          npm install --prefix dist --no-save --no-package-lock \
            "better-sqlite3@$BSQ3_VER" \
            "onnxruntime-node@$ONNX_VER" \
            "sqlite-vec@$SQLITE_VEC_VER" \
            "$SQLITE_VEC_NATIVE" \
            "@1password/sdk@$OP_VER" \
            "libsodium-wrappers@$SODIUM_VER" \
            "@huggingface/transformers@$HF_VER"
          tar czf "$ARTIFACT_DIR/signet-daemon-js-$PLATFORM.tar.gz" -C dist .

      # ── Rust binaries ──

      - name: Build Rust daemon
        run: |
          cargo build --release --manifest-path platform/daemon-rs/Cargo.toml --target "$RUST_TARGET" -p signet-daemon
          STAGE="$ARTIFACT_DIR/signet-daemon-rs-$PLATFORM"
          mkdir -p "$STAGE"
          cp "platform/daemon-rs/target/$RUST_TARGET/release/signet-daemon" "$STAGE/signet-daemon"
          chmod +x "$STAGE/signet-daemon"
          tar czf "$ARTIFACT_DIR/signet-daemon-rs-$PLATFORM.tar.gz" -C "$STAGE" signet-daemon

      # ── Connectors ──

      - name: Build connectors
        if: matrix.platform == 'linux-x64'
        run: |
          bun run build:connector-base
          bun run build:deps
          STAGE="$ARTIFACT_DIR/signet-connectors"
          mkdir -p "$STAGE"
          for pkg in integrations/*/connector/dist libs/connector-base/dist; do
            if [ "$pkg" = "libs/connector-base/dist" ]; then
              name="connector-base"
            else
              name="$(basename "$(dirname "$(dirname "$pkg")")")"
            fi
            mkdir -p "$STAGE/$name"
            cp -r "$pkg"/* "$STAGE/$name/" 2>/dev/null || true
          done
          tar czf "$ARTIFACT_DIR/signet-connectors.tar.gz" -C "$STAGE" .

      # ── Plugins ──

      - name: Build OpenCode plugin
        if: matrix.platform == 'linux-x64'
        run: |
          bun run build:opencode-plugin
          STAGE="$ARTIFACT_DIR/signet-plugin-opencode"
          mkdir -p "$STAGE"
          cp integrations/opencode/plugin/dist/signet.mjs "$STAGE/"
          tar czf "$ARTIFACT_DIR/signet-plugin-opencode.tar.gz" -C "$STAGE" .

      - name: Build Oh My Pi extension
        if: matrix.platform == 'linux-x64'
        run: |
          bun run build:oh-my-pi-extension
          STAGE="$ARTIFACT_DIR/signet-plugin-oh-my-pi"
          mkdir -p "$STAGE"
          cp integrations/oh-my-pi/extension/dist/signet-oh-my-pi.mjs "$STAGE/"
          tar czf "$ARTIFACT_DIR/signet-plugin-oh-my-pi.tar.gz" -C "$STAGE" .

      - name: Build Pi extension
        if: matrix.platform == 'linux-x64'
        run: |
          bun run build:pi-extension
          STAGE="$ARTIFACT_DIR/signet-plugin-pi"
          mkdir -p "$STAGE"
          cp integrations/pi/extension/dist/signet-pi.mjs "$STAGE/"
          if [ ! -s "$STAGE/signet-pi.mjs" ]; then
            echo "::error::Pi extension build did not produce signet-pi.mjs"
            exit 1
          fi
          tar czf "$ARTIFACT_DIR/signet-plugin-pi.tar.gz" -C "$STAGE" .

      # ── Native modules ──

      - name: Build native module
        run: |
          cd platform/native
          bun run build
          STAGE="$ARTIFACT_DIR/signet-native-$PLATFORM"
          mkdir -p "$STAGE"
          cp *.node "$STAGE/"
          if [ -z "$(ls "$STAGE"/*.node 2>/dev/null)" ]; then
            echo "::error::Native build produced no .node files"
            exit 1
          fi
          tar czf "$ARTIFACT_DIR/signet-native-$PLATFORM.tar.gz" -C "$STAGE" .

       # ── Content bundles (platform-independent) ──

      - name: Package skills
        if: matrix.platform == 'linux-x64'
        run: |
          tar czf "$ARTIFACT_DIR/signet-skills.tar.gz" -C skills .

      - name: Package templates
        if: matrix.platform == 'linux-x64'
        run: |
          tar czf "$ARTIFACT_DIR/signet-templates.tar.gz" -C surfaces/cli/templates .

      # ── CI workflow bundle (independently updateable) ──

      - name: Bundle CI workflows
        if: matrix.platform == 'linux-x64'
        run: |
          STAGE="$ARTIFACT_DIR/signet-workflows"
          mkdir -p "$STAGE"
          cp .github/workflows/bundle.yml "$STAGE/"
          tar czf "$ARTIFACT_DIR/signet-workflows.tar.gz" -C "$STAGE" .

      # ── Electron desktop app (macOS DMG) ──

      - name: Build Electron desktop app
        if: startsWith(github.ref, 'refs/heads/main') && startsWith(matrix.platform, 'darwin-')
        run: |
          cd surfaces/desktop
          bun install
          bun run build:core
          bun run build:tray
          bun run build:daemon
          bun run stage:runtime
          bun run build:main
          npx electron-builder --mac dmg --${{ matrix.electron_arch }} --publish never
          mkdir -p "$ARTIFACT_DIR"
          if ! ls release/*.dmg >/dev/null 2>&1; then
            echo "::error::Electron build produced no macOS DMG"
            exit 1
          fi
          if ! ls release/*.zip >/dev/null 2>&1; then
            echo "::error::Electron build produced no macOS zip"
            exit 1
          fi
          cp release/*.dmg "$ARTIFACT_DIR/"
          cp release/*.zip "$ARTIFACT_DIR/"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Checksums ──

      - name: Generate checksums
        run: |
          cd "$ARTIFACT_DIR"
          SHA_CMD="sha256sum"
          if ! command -v sha256sum >/dev/null 2>&1; then
            SHA_CMD="shasum -a 256"
          fi
          for f in *.tar.gz; do
            $SHA_CMD "$f" > "$f.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: ${{ env.ARTIFACT_DIR }}/*

  release:
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.should_build == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all-artifacts
          pattern: bundle-*

      - name: Generate manifests
        run: |
          VERSION="$(jq -r '.version' package.json)"
          ASSET_TAG="bundle-${VERSION}-${GITHUB_SHA}"
          SHARED_DIR="/tmp/all-artifacts/bundle-linux-x64"
          HELPER_SCRIPT_DIR="/tmp/release-helper-scripts"
          MANIFEST_DIR="/tmp/release-manifests"
          SHA_CMD="sha256sum"
          if ! command -v sha256sum >/dev/null 2>&1; then
            SHA_CMD="shasum -a 256"
          fi
          rm -rf "$HELPER_SCRIPT_DIR"
          rm -rf "$MANIFEST_DIR"
          mkdir -p "$HELPER_SCRIPT_DIR" "$MANIFEST_DIR"
          for script in install.sh update.sh uninstall.sh; do
            cp "deploy/bundle/$script" "$HELPER_SCRIPT_DIR/$script"
            $SHA_CMD "$HELPER_SCRIPT_DIR/$script" > "$HELPER_SCRIPT_DIR/$script.sha256"
          done
          for PLATFORM in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            PLAT_DIR="/tmp/all-artifacts/bundle-$PLATFORM"
            if [ ! -d "$PLAT_DIR" ]; then continue; fi
            MERGE_DIR="/tmp/manifest-merge/$PLATFORM"
            mkdir -p "$MERGE_DIR"
            # Copy shared (platform-independent) artifacts from linux-x64
            if [ "$PLATFORM" != "linux-x64" ] && [ -d "$SHARED_DIR" ]; then
              for f in "$SHARED_DIR"/*.tar.gz "$SHARED_DIR"/*.sha256; do
                base="$(basename "$f")"
                case "$base" in
                  *-darwin-arm64.*|*-darwin-x64.*|*-linux-x64.*|*-linux-arm64.*) continue ;;
                esac
                [ ! -f "$MERGE_DIR/$base" ] && cp "$f" "$MERGE_DIR/"
              done
            fi
            # Copy platform-specific artifacts
            for f in "$PLAT_DIR"/*.tar.gz "$PLAT_DIR"/*.sha256; do
              cp "$f" "$MERGE_DIR/"
            done
            for script in install.sh update.sh uninstall.sh; do
              cp "$HELPER_SCRIPT_DIR/$script" "$HELPER_SCRIPT_DIR/$script.sha256" "$MERGE_DIR/"
            done
            bun deploy/bundle/scripts/generate-manifest.ts \
              "$VERSION" "$PLATFORM" "$MERGE_DIR" "$ASSET_TAG" \
              > "$MERGE_DIR/manifest-$PLATFORM.json"
            if ! jq -e --arg tag "$ASSET_TAG" \
              '([.components[]?, .scripts[]?] | all(.url | contains("/releases/download/" + $tag + "/")))' \
              "$MERGE_DIR/manifest-$PLATFORM.json" >/dev/null; then
              echo "::error::Merged manifest for $PLATFORM does not point at immutable asset tag $ASSET_TAG"
              exit 1
            fi
            # Desktop artifacts are released as macOS .dmg/.zip assets, not manifest components.
            case "$PLATFORM" in
              darwin-*)
                if ! find "$PLAT_DIR" -maxdepth 1 -type f -name '*.dmg' -print -quit | grep -q .; then
                  echo "::error::Missing desktop DMG release asset for $PLATFORM"
                  exit 1
                fi
                if ! find "$PLAT_DIR" -maxdepth 1 -type f -name '*.zip' -print -quit | grep -q .; then
                  echo "::error::Missing desktop zip release asset for $PLATFORM"
                  exit 1
                fi
                ;;
            esac
            for component in node cli daemon-js daemon-rs dashboard connectors plugin-opencode plugin-oh-my-pi plugin-pi native skills templates; do
              if ! jq -e --arg component "$component" \
                '.components[$component].url and .components[$component].sha256 and (.components[$component].size > 0)' \
                "$MERGE_DIR/manifest-$PLATFORM.json" >/dev/null; then
                echo "::error::Merged manifest for $PLATFORM missing expected component: $component"
                exit 1
              fi
            done
            for script in install.sh update.sh uninstall.sh; do
              if ! jq -e --arg script "$script" \
                '.scripts[$script].url and .scripts[$script].sha256 and (.scripts[$script].size > 0)' \
                "$MERGE_DIR/manifest-$PLATFORM.json" >/dev/null; then
                echo "::error::Merged manifest for $PLATFORM missing expected helper script: $script"
                exit 1
              fi
            done
            CHECK_DIR="/tmp/bundle-layout-check/$PLATFORM"
            rm -rf "$CHECK_DIR"
            mkdir -p "$CHECK_DIR/runtime/node" "$CHECK_DIR/runtime/cli" "$CHECK_DIR/runtime/daemon-js"
            tar xzf "$MERGE_DIR/signet-node-$PLATFORM.tar.gz" -C "$CHECK_DIR/runtime/node"
            tar xzf "$MERGE_DIR/signet-cli.tar.gz" -C "$CHECK_DIR/runtime/cli"
            tar xzf "$MERGE_DIR/signet-daemon-js-$PLATFORM.tar.gz" -C "$CHECK_DIR/runtime/daemon-js"
            for entrypoint in \
              "$CHECK_DIR/runtime/node/bin/node" \
              "$CHECK_DIR/runtime/cli/cli.js" \
              "$CHECK_DIR/runtime/cli/package.json" \
              "$CHECK_DIR/runtime/daemon-js/daemon.js" \
              "$CHECK_DIR/runtime/daemon-js/index.js"; do
              if [ ! -e "$entrypoint" ]; then
                echo "::error::Bundle artifact layout missing $entrypoint"
                exit 1
              fi
            done
            if [ "$PLATFORM" = "linux-x64" ]; then
              # Runtime smoke can only execute the assembled bundle matching the release runner OS/arch.
              SIGNET_DAEMON_SMOKE_MODULE="$CHECK_DIR/runtime/daemon-js/index.js" \
                "$CHECK_DIR/runtime/node/bin/node" \
                --input-type=module \
                -e 'await import(process.env.SIGNET_DAEMON_SMOKE_MODULE)'
              mkdir -p "$CHECK_DIR/bin" "$CHECK_DIR/smoke-agents"
              {
                printf '%s\n' '#!/usr/bin/env bash'
                printf '%s\n' 'set -euo pipefail'
                printf '%s\n' 'SIGNET_DIR="$(cd "$(dirname "$0")/.." && pwd)"'
                printf '%s\n' 'export SIGNET_DIR'
                printf '%s\n' 'export SIGNET_DASHBOARD_DIR="$SIGNET_DIR/runtime/dashboard"'
                printf '%s\n' 'export SIGNET_SKILLS_SOURCE="$SIGNET_DIR/runtime/skills"'
                printf '%s\n' 'export SIGNET_TEMPLATES_DIR="$SIGNET_DIR/runtime/templates"'
                printf '%s\n' 'export NODE_PATH="$SIGNET_DIR/runtime/daemon-js/node_modules"'
                printf '%s\n' 'case "$(uname -s)" in'
                printf '%s\n' '  Linux)  export LD_LIBRARY_PATH="$SIGNET_DIR/runtime/native${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" ;;'
                printf '%s\n' '  Darwin) export DYLD_LIBRARY_PATH="$SIGNET_DIR/runtime/native${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}" ;;'
                printf '%s\n' 'esac'
                printf '%s\n' 'exec "$SIGNET_DIR/runtime/node/bin/node" "$SIGNET_DIR/runtime/cli/cli.js" "$@"'
              } > "$CHECK_DIR/bin/signet"
              chmod +x "$CHECK_DIR/bin/signet"
              "$CHECK_DIR/bin/signet" --help >/dev/null
              "$CHECK_DIR/bin/signet" setup --help >/dev/null
              "$CHECK_DIR/bin/signet" dashboard --help >/dev/null
              "$CHECK_DIR/bin/signet" daemon --help >/dev/null
              "$CHECK_DIR/bin/signet" daemon status --path "$CHECK_DIR/smoke-agents" --json >/dev/null
              "$CHECK_DIR/bin/signet" mcp --help >/dev/null

              SMOKE_PORT="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')"
              SMOKE_PID=""
              SMOKE_LOG="$CHECK_DIR/daemon-smoke.log"
              trap 'if [ -n "${SMOKE_PID:-}" ]; then kill "$SMOKE_PID" 2>/dev/null || true; fi' EXIT
              SIGNET_DIR="$CHECK_DIR" \
                SIGNET_PATH="$CHECK_DIR/smoke-agents" \
                SIGNET_PORT="$SMOKE_PORT" \
                SIGNET_HOST="127.0.0.1" \
                SIGNET_BIND="127.0.0.1" \
                SIGNET_DAEMON_ENTRYPOINT="1" \
                SIGNET_DASHBOARD_DIR="$CHECK_DIR/runtime/dashboard" \
                SIGNET_SKILLS_SOURCE="$CHECK_DIR/runtime/skills" \
                SIGNET_TEMPLATES_DIR="$CHECK_DIR/runtime/templates" \
                NODE_PATH="$CHECK_DIR/runtime/daemon-js/node_modules" \
                LD_LIBRARY_PATH="$CHECK_DIR/runtime/native${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \
                "$CHECK_DIR/runtime/node/bin/node" "$CHECK_DIR/runtime/daemon-js/daemon.js" > "$SMOKE_LOG" 2>&1 &
              SMOKE_PID="$!"
              SMOKE_OK=0
              for _ in {1..30}; do
                if curl -fsS "http://127.0.0.1:${SMOKE_PORT}/health" | grep -q '"status":"healthy"'; then
                  SMOKE_OK=1
                  break
                fi
                if ! kill -0 "$SMOKE_PID" 2>/dev/null; then
                  echo "::error::Bundled Node daemon exited before /health became ready"
                  cat "$SMOKE_LOG"
                  exit 1
                fi
                sleep 1
              done
              if [ "$SMOKE_OK" != "1" ]; then
                echo "::error::Bundled Node daemon did not become healthy"
                cat "$SMOKE_LOG"
                exit 1
              fi
              kill "$SMOKE_PID" 2>/dev/null || true
              wait "$SMOKE_PID" 2>/dev/null || true
              SMOKE_PID=""
            fi
            # Copy manifest into explicit release staging inputs for upload
            cp "$MERGE_DIR/manifest-$PLATFORM.json" "$MANIFEST_DIR/"
            cp "$MERGE_DIR/manifest-$PLATFORM.json" "$PLAT_DIR/"
            # Copy shared artifacts into platform dir so they get uploaded
            if [ "$PLATFORM" != "linux-x64" ] && [ -d "$SHARED_DIR" ]; then
              for f in "$MERGE_DIR"/*.tar.gz "$MERGE_DIR"/*.sha256; do
                [ -f "$f" ] || continue
                base="$(basename "$f")"
                [ ! -f "$PLAT_DIR/$base" ] && cp "$f" "$PLAT_DIR/"
              done
            fi
          done

      - name: Find or create releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(jq -r '.version' package.json)"
          ASSET_TAG="bundle-${VERSION}-${GITHUB_SHA}"
          LATEST_TAG="bundle-latest"
          REPO="${{ github.repository }}"
          if ! gh release view "$ASSET_TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$ASSET_TAG" --repo "$REPO" --title "Bundle ${VERSION} (${GITHUB_SHA::12})" --notes "Immutable native bundle assets for ${GITHUB_SHA}. bundle-latest is updated after these assets are published." --prerelease
          fi
          if ! gh release view "$LATEST_TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$LATEST_TAG" --repo "$REPO" --title "Latest Bundle" --notes "Stable manifest pointer for the latest native bundle." --prerelease
          fi

      - name: De-duplicate and stage release assets
        run: |
          mkdir -p /tmp/release-staging
          # Copy all artifacts into a flat staging dir, skipping duplicates
          find /tmp/all-artifacts /tmp/release-helper-scripts /tmp/release-manifests -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.sh.sha256' -o -name '*.dmg' -o -name '*.zip' -o -name '*.sh' -o -name 'manifest-*.json' \) | while read -r f; do
            base="$(basename "$f")"
            if [ -f "/tmp/release-staging/$base" ]; then
              existing="$(sha256sum "/tmp/release-staging/$base" | awk '{print $1}')"
              current="$(sha256sum "$f" | awk '{print $1}')"
              if [ "$existing" = "$current" ]; then continue; fi
              echo "::error::Duplicate asset $base with different content"
              exit 1
            fi
            cp "$f" "/tmp/release-staging/"
          done

      - name: Upload immutable assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(jq -r '.version' package.json)"
          TAG="bundle-${VERSION}-${GITHUB_SHA}"
          REPO="${{ github.repository }}"
          for pattern in '*.tar.gz' '*.sha256' '*.sh.sha256' '*.dmg' '*.zip' '*.sh' 'manifest-*.json'; do
            find /tmp/release-staging -type f -name "$pattern" | while read -r f; do
              gh release upload "$TAG" "$f" --repo "$REPO" --clobber
            done
          done
          for script in install.sh update.sh uninstall.sh; do
            for helper_asset in "/tmp/release-staging/$script" "/tmp/release-staging/$script.sha256"; do
              if [ ! -f "$helper_asset" ]; then
                echo "::error::Missing staged helper asset: $(basename "$helper_asset")"
                exit 1
              fi
              gh release upload "$TAG" "$helper_asset" --repo "$REPO" --clobber
            done
          done

      - name: Upload manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="bundle-latest"
          REPO="${{ github.repository }}"
          # bundle-latest is the stable pointer. It only advances after immutable assets exist.
          find /tmp/release-staging -type f -name 'manifest-*.json' | while read -r f; do
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber
          done
