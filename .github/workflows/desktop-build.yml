name: Desktop Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      signing_mode:
        description: "Signing mode for macOS/Windows desktop artifacts"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - official
          - self-signed

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            os_name: macos-arm64
          - runner: macos-15-intel
            arch: x64
            os_name: macos-x64
          - runner: ubuntu-22.04
            arch: x64
            os_name: linux-x64
          - runner: windows-latest
            arch: x64
            os_name: windows-x64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve signing mode
        id: signing
        shell: bash
        env:
          SIGNING_MODE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.signing_mode || 'auto' }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          mode="${SIGNING_MODE_INPUT}"
          runner="${{ matrix.runner }}"
          has_official=0
          requires_signing=0
          missing=()

          require_secret() {
            name="$1"
            value="$2"
            if [ -z "${value}" ]; then
              missing+=("${name}")
            fi
          }

          if [[ "${runner}" == macos-* ]]; then
            requires_signing=1
            require_secret APPLE_CERTIFICATE "${APPLE_CERTIFICATE:-}"
            require_secret APPLE_CERTIFICATE_PASSWORD "${APPLE_CERTIFICATE_PASSWORD:-}"
            require_secret APPLE_SIGNING_IDENTITY "${APPLE_SIGNING_IDENTITY:-}"
          elif [ "${runner}" = "windows-latest" ]; then
            requires_signing=1
            require_secret WINDOWS_CERTIFICATE "${WINDOWS_CERTIFICATE:-}"
            require_secret WINDOWS_CERTIFICATE_PASSWORD "${WINDOWS_CERTIFICATE_PASSWORD:-}"
          fi

          if [ "${requires_signing}" -eq 1 ] && [ "${#missing[@]}" -eq 0 ]; then
            has_official=1
          fi

          if [ "${mode}" = "official" ] && [ "${requires_signing}" -eq 0 ]; then
            echo "::notice::Official signing is not applicable for ${runner}; using unsigned Linux packaging"
            mode="self-signed"
          fi

          if [ "${mode}" = "official" ] && [ "${requires_signing}" -eq 1 ] && [ "${has_official}" -ne 1 ]; then
            printf '::error::signing_mode=official but required signing secrets are missing: %s\n' "${missing[*]}"
            exit 1
          fi

          if [ "${mode}" = "auto" ]; then
            if [ "${has_official}" -eq 1 ]; then
              mode="official"
            else
              mode="self-signed"
              printf '::warning::Official signing secrets missing, falling back to self-signed mode: %s\n' "${missing[*]}"
            fi
          fi
          if [ "${mode}" != "official" ] && [ "${mode}" != "self-signed" ]; then
            echo "::error::Invalid signing mode: ${mode}"
            exit 1
          fi
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "Desktop signing mode: ${mode}"

      - name: Configure Electron signing
        if: steps.signing.outputs.mode == 'official'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          write_env() {
            name="$1"
            value="$2"
            marker="EOF_${name}_$$"
            {
              echo "${name}<<${marker}"
              printf '%s\n' "${value}"
              echo "${marker}"
            } >> "${GITHUB_ENV}"
          }

          if [[ "${{ matrix.runner }}" == macos-* ]]; then
            write_env CSC_LINK "${APPLE_CERTIFICATE}"
            write_env CSC_KEY_PASSWORD "${APPLE_CERTIFICATE_PASSWORD}"
            write_env CSC_NAME "${APPLE_SIGNING_IDENTITY}"
          elif [ "${{ matrix.runner }}" = "windows-latest" ]; then
            write_env CSC_LINK "${WINDOWS_CERTIFICATE}"
            write_env CSC_KEY_PASSWORD "${WINDOWS_CERTIFICATE_PASSWORD}"
          fi

      - name: Install dependencies
        run: bun install

      - name: Build Electron desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.signing.outputs.mode == 'official' && 'true' || 'false' }}
          ELECTRON_BUILDER_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          cd surfaces/desktop

          for attempt in 1 2 3; do
            if bun run build:desktop -- --${{ matrix.arch }}; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              break
            fi
            echo "::warning::Electron desktop build failed on attempt ${attempt}; retrying after cleanup"
            rm -rf release dist resources/daemon resources/runtime
            sleep "$((attempt * 15))"
          done

          echo "::error::Electron desktop build failed after 3 attempts"
          exit 1

      - name: Generate AUR metadata
        if: matrix.runner == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          APPIMAGE="$(find surfaces/desktop/release -name '*.AppImage' | head -n 1)"
          if [ -z "${APPIMAGE}" ]; then
            echo "::error::No AppImage artifact found"
            exit 1
          fi
          SHA="$(sha256sum "${APPIMAGE}" | awk '{print $1}')"
          VER="${GITHUB_REF_NAME#v}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VER}/$(basename "${APPIMAGE}")"
          bash deploy/aur/generate-pkgbuild.sh "${VER}" "${URL}" "${SHA}"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os_name }}
          path: |
            surfaces/desktop/release/*.dmg
            surfaces/desktop/release/*.AppImage
            surfaces/desktop/release/*.deb
            surfaces/desktop/release/*.exe
            surfaces/desktop/release/*.blockmap
            surfaces/desktop/release/latest*.yml
          if-no-files-found: error

      - name: Upload AUR metadata
        if: matrix.runner == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: aur-metadata
          path: |
            deploy/aur/PKGBUILD
            deploy/aur/.SRCINFO
          include-hidden-files: true

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            surfaces/desktop/release/*.dmg
            surfaces/desktop/release/*.AppImage
            surfaces/desktop/release/*.deb
            surfaces/desktop/release/*.exe
            surfaces/desktop/release/*.blockmap
            surfaces/desktop/release/latest*.yml

  validate-aur:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download AUR metadata
        uses: actions/download-artifact@v4
        with:
          name: aur-metadata
          path: deploy/aur

      - name: Validate Arch package metadata
        run: |
          set -euo pipefail
          test -f deploy/aur/PKGBUILD
          test -f deploy/aur/.SRCINFO
          docker run --rm \
            -v "${PWD}:/work" \
            -w /work/deploy/aur \
            archlinux:latest \
            bash -lc '
              set -euo pipefail
              pacman -Sy --noconfirm base-devel pacman-contrib sudo
              useradd -m builder
              chown -R builder:builder /work/deploy/aur
              su builder -c "cd /work/deploy/aur && makepkg --printsrcinfo > /tmp/.SRCINFO.generated"
              diff -u /work/deploy/aur/.SRCINFO /tmp/.SRCINFO.generated
            '
