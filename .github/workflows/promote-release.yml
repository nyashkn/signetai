name: Promote Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Nightly version to promote to stable/latest (e.g. 0.113.1)"
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Promote to stable/latest
        run: |
          set -euo pipefail
          test -n "$NODE_AUTH_TOKEN"
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          required_packages=(
            "@signetai/signetai-linux-x64"
            "@signetai/signetai-linux-arm64"
            "@signetai/signetai-darwin-x64"
            "@signetai/signetai-darwin-arm64"
            "@signetai/signetai-win32-x64"
            "signetai"
          )
          for package in "${required_packages[@]}"; do
            npm view "${package}@${VERSION}" version >/dev/null
            npm dist-tag add "${package}@${VERSION}" latest
          done
          npm dist-tag add "@signetai/signet-memory-openclaw@${VERSION}" latest || true
          gh release edit "v${VERSION}" --repo "$GITHUB_REPOSITORY" --prerelease=false --latest
          echo "Promoted v${VERSION} to stable/latest"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
          VERSION: ${{ inputs.version }}
