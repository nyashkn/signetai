<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
		<link rel="manifest" href="/manifest.json">
		<meta name="theme-color" content="#0a0a0b">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="apple-mobile-web-app-title" content="Signet">
		<link rel="apple-touch-icon" href="/icon-192.png">
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="preload" href="/fonts/PixelifySans-Regular.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="preload" href="/fonts/Silkscreen-Regular.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="preload" href="/fonts/VT323-Regular.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="preload" href="/fonts/Tiny5-Regular.woff2" as="font" type="font/woff2" crossorigin>
		<script>
			// Set theme before first paint to prevent flash
			(function() {
				var t = localStorage.getItem('signet-theme');
				if (!t) {
					t = window.matchMedia('(prefers-color-scheme: light)').matches
						? 'light' : 'dark';
				}
				document.documentElement.dataset.theme = t;
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
